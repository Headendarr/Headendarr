---
networks:
  private-net:

services:
  # -- Headendarr --
  headendarr:
    image: ghcr.io/headendarr/headendarr:latest

    # NETWORK:
    networks:
      - private-net
    ports:
      # App Port (9985)
      - 9985:9985
      # TVH Webui
      - 9981:9981
      # TVH HTSP
      - 9982:9982

    # ENVIRONMENT:
    environment:
      # Process user ID
      - PUID=1000
      # Process group ID
      - PGID=1000
      # Timezone
      - TZ=Pacific/Auckland
      # Optional VOD cache retention window in minutes (default: 10)
      # - TIC_VOD_CACHE_RETENTION_MINUTES=10080
      # Optional OIDC SSO
      # - TIC_AUTH_OIDC_ENABLED=true
      # - TIC_AUTH_OIDC_ISSUER_URL=https://auth.example.com
      # - TIC_AUTH_OIDC_CLIENT_ID=headendarr
      # - TIC_AUTH_OIDC_CLIENT_SECRET=replace-me
      # - TIC_AUTH_OIDC_REDIRECT_URI=https://headendarr.example.com/tic-api/auth/oidc/callback
      # - TIC_AUTH_OIDC_ADMIN_GROUPS=headendarr-admin
      # - TIC_AUTH_OIDC_STREAMER_GROUPS=headendarr-streamer

    # VOLUMES:
    volumes:
      # Configuration files
      - /data/containers/tvh-iptv/tic-config:/config
      # Recording storage
      - /data/containers/tvh-iptv/tic-recordings:/recordings
      - /data/containers/tvh-iptv/tic-timeshift:/timeshift
      - /data/containers/tvh-iptv/tic-library:/library
    tmpfs:
      - /tmp/cache:size=${TMP_CACHE_SIZE:-536870912}

    ## # DEVICES:
    ## devices:
    ##   - /dev/dri #optional
    ##   - /dev/dvb #optional
